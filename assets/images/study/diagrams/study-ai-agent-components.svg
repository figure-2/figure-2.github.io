<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" width="1080" height="560" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Components</title>
  <desc id="desc">목표 또는 입력이 LLM으로 들어가고, LLM은 planning, memory, tools와 연결되어 observation을 다시 받아 답변 또는 실행 결과를 만든다.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:26px;font-weight:800}
      .sub{font-size:13px;fill:#64748b}
      .core{fill:#eef2ff;stroke:#6366f1;stroke-width:2}
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:1.5}
      .out{fill:#ecfdf5;stroke:#10b981;stroke-width:1.8}
      .label{font-size:18px;font-weight:800}
      .small{font-size:13px;fill:#64748b}
      .arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#94a3b8;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="40" y="48" class="title">Agent = LLM + Memory + Planning + Tools</text>
  <text x="40" y="76" class="sub">Agent다운 구조는 도구 결과와 기억을 보고 다음 행동을 바꾼다.</text>

  <g transform="translate(70 245)">
    <rect width="150" height="76" rx="14" class="node"/>
    <text x="75" y="34" text-anchor="middle" class="label">목표 / 입력</text>
    <text x="75" y="56" text-anchor="middle" class="small">Goal / Input</text>
  </g>
  <g transform="translate(430 222)">
    <rect width="210" height="122" rx="22" class="core"/>
    <text x="105" y="51" text-anchor="middle" class="label">LLM</text>
    <text x="105" y="77" text-anchor="middle" class="small">추론, 판단, 생성</text>
  </g>
  <g transform="translate(430 110)">
    <rect width="210" height="72" rx="14" class="node"/>
    <text x="105" y="31" text-anchor="middle" class="label">Planning</text>
    <text x="105" y="53" text-anchor="middle" class="small">목표를 단계로 분해</text>
  </g>
  <g transform="translate(430 390)">
    <rect width="210" height="72" rx="14" class="node"/>
    <text x="105" y="31" text-anchor="middle" class="label">Memory</text>
    <text x="105" y="53" text-anchor="middle" class="small">작업 상태와 경험</text>
  </g>
  <g transform="translate(735 110)">
    <rect width="190" height="72" rx="14" class="node"/>
    <text x="95" y="31" text-anchor="middle" class="label">Tools</text>
    <text x="95" y="53" text-anchor="middle" class="small">API, DB, 파일, 검색</text>
  </g>
  <g transform="translate(735 390)">
    <rect width="190" height="72" rx="14" class="node"/>
    <text x="95" y="31" text-anchor="middle" class="label">Observation</text>
    <text x="95" y="53" text-anchor="middle" class="small">도구 실행 결과</text>
  </g>
  <g transform="translate(820 245)">
    <rect width="170" height="76" rx="14" class="out"/>
    <text x="85" y="34" text-anchor="middle" class="label">답변 / 실행 결과</text>
    <text x="85" y="56" text-anchor="middle" class="small">Output</text>
  </g>

  <path d="M220 283H430" class="arrow"/>
  <path d="M535 222V182" class="soft"/>
  <path d="M535 344V390" class="soft"/>
  <path d="M640 146H735" class="arrow"/>
  <path d="M830 182V390" class="arrow"/>
  <path d="M735 426H640" class="arrow"/>
  <path d="M640 283H820" class="arrow"/>
</svg>
