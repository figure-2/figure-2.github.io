<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" width="1180" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Router, Orchestrator, Evaluator, HITL Hybrid Flow</title>
  <desc id="desc">입력이 Router, Orchestrator, Worker A/B/C, 결과 취합, Evaluator, 위험 작업 판단, Human Review 또는 Output으로 이어지는 하이브리드 흐름.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:26px;font-weight:800}
      .sub{font-size:13px;fill:#64748b}
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:1.5}
      .main{fill:#eef2ff;stroke:#6366f1;stroke-width:1.8}
      .worker{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}
      .risk{fill:#fff7ed;stroke:#fb923c;stroke-width:1.8}
      .out{fill:#ecfdf5;stroke:#10b981;stroke-width:1.8}
      .label{font-size:16px;font-weight:800}
      .small{font-size:12px;fill:#64748b}
      .arrow{stroke:#2563eb;stroke-width:2.1;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="520" fill="#ffffff"/>
  <text x="40" y="48" class="title">Hybrid Pattern: Router → Orchestrator → Evaluator → HITL</text>
  <text x="40" y="76" class="sub">복잡한 작업은 패턴을 하나만 쓰지 않고, 분기·분해·평가·사람 승인으로 통제한다.</text>

  <g transform="translate(52 220)"><rect width="110" height="62" rx="12" class="node"/><text x="55" y="37" text-anchor="middle" class="label">입력</text></g>
  <g transform="translate(200 220)"><rect width="130" height="62" rx="12" class="main"/><text x="65" y="37" text-anchor="middle" class="label">Router</text></g>
  <g transform="translate(380 220)"><rect width="150" height="62" rx="12" class="main"/><text x="75" y="37" text-anchor="middle" class="label">Orchestrator</text></g>
  <g transform="translate(585 110)"><rect width="130" height="56" rx="10" class="worker"/><text x="65" y="33" text-anchor="middle" class="label">Worker A</text></g>
  <g transform="translate(585 220)"><rect width="130" height="56" rx="10" class="worker"/><text x="65" y="33" text-anchor="middle" class="label">Worker B</text></g>
  <g transform="translate(585 330)"><rect width="130" height="56" rx="10" class="worker"/><text x="65" y="33" text-anchor="middle" class="label">Worker C</text></g>
  <g transform="translate(770 220)"><rect width="130" height="62" rx="12" class="node"/><text x="65" y="28" text-anchor="middle" class="label">결과 취합</text><text x="65" y="47" text-anchor="middle" class="small">Merge</text></g>
  <g transform="translate(945 220)"><rect width="130" height="62" rx="12" class="main"/><text x="65" y="37" text-anchor="middle" class="label">Evaluator</text></g>
  <g transform="translate(945 350)"><path d="M65 0 L130 43 L65 86 L0 43 Z" class="risk"/><text x="65" y="37" text-anchor="middle" class="label">위험</text><text x="65" y="56" text-anchor="middle" class="small">작업인가?</text></g>
  <g transform="translate(760 420)"><rect width="140" height="56" rx="10" class="risk"/><text x="70" y="33" text-anchor="middle" class="label">Human Review</text></g>
  <g transform="translate(1028 420)"><rect width="110" height="56" rx="10" class="out"/><text x="55" y="33" text-anchor="middle" class="label">Output</text></g>

  <path d="M162 251H200" class="arrow"/><path d="M330 251H380" class="arrow"/>
  <path d="M530 251C560 251 560 138 585 138" class="arrow"/>
  <path d="M530 251H585" class="arrow"/>
  <path d="M530 251C560 251 560 358 585 358" class="arrow"/>
  <path d="M715 138C750 138 740 251 770 251" class="arrow"/>
  <path d="M715 248H770" class="arrow"/>
  <path d="M715 358C750 358 740 251 770 251" class="arrow"/>
  <path d="M900 251H945" class="arrow"/>
  <path d="M1010 282V350" class="arrow"/>
  <path d="M945 393H900V448" class="arrow"/><text x="915" y="382" class="small">예</text>
  <path d="M1075 393H1083V420" class="arrow"/><text x="1088" y="382" class="small">아니오</text>
  <path d="M900 448H1028" class="arrow"/>
</svg>
