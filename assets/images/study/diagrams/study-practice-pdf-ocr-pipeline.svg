<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-labelledby="title desc">
  <title id="title">PDF OCR Document Processing Pipeline</title>
  <desc id="desc">PDF 문서를 레이아웃 분석, OCR, 표와 그림 분리, 구조화 저장, 검색 입력으로 바꾸는 실습 흐름.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:30px;font-weight:800}
      .subtitle{font-size:14px;fill:#64748b}
      .group{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:1.5}
      .blue{fill:#eff6ff;stroke:#3b82f6}
      .green{fill:#ecfdf5;stroke:#10b981}
      .orange{fill:#fff7ed;stroke:#f97316}
      .purple{fill:#f5f3ff;stroke:#8b5cf6}
      .red{fill:#fef2f2;stroke:#ef4444}
      .label{font-size:17px;font-weight:800}
      .small{font-size:12px;fill:#64748b}
      .note{font-size:14px;font-weight:700;fill:#334155}
      .arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="48" y="54" class="title">PDF/OCR 문서 처리 실습 흐름</text>
  <text x="48" y="82" class="subtitle">핵심은 OCR 모델 자체보다 “어떤 단위로 분리하고 저장할 것인가”였다.</text>

  <rect x="44" y="118" width="1192" height="388" rx="18" class="group"/>

  <g transform="translate(80 180)">
    <rect width="150" height="86" rx="14" class="box blue"/>
    <text x="75" y="35" text-anchor="middle" class="label">PDF 입력</text>
    <text x="75" y="60" text-anchor="middle" class="small">스캔본, 논문, 리포트</text>
  </g>
  <path d="M235 223 H305" class="arrow"/>

  <g transform="translate(310 180)">
    <rect width="170" height="86" rx="14" class="box green"/>
    <text x="85" y="30" text-anchor="middle" class="label">Layout 분석</text>
    <text x="85" y="55" text-anchor="middle" class="small">본문, 표, 그림, 수식</text>
  </g>
  <path d="M485 223 H555" class="arrow"/>

  <g transform="translate(560 180)">
    <rect width="170" height="86" rx="14" class="box orange"/>
    <text x="85" y="30" text-anchor="middle" class="label">OCR / Parser</text>
    <text x="85" y="55" text-anchor="middle" class="small">텍스트 추출과 정제</text>
  </g>
  <path d="M735 223 H805" class="arrow"/>

  <g transform="translate(810 180)">
    <rect width="170" height="86" rx="14" class="box purple"/>
    <text x="85" y="30" text-anchor="middle" class="label">구조화</text>
    <text x="85" y="55" text-anchor="middle" class="small">caption, table, metadata</text>
  </g>
  <path d="M985 223 H1055" class="arrow"/>

  <g transform="translate(1060 180)">
    <rect width="130" height="86" rx="14" class="box red"/>
    <text x="65" y="30" text-anchor="middle" class="label">검색 입력</text>
    <text x="65" y="55" text-anchor="middle" class="small">RAG / QA</text>
  </g>

  <g transform="translate(104 330)">
    <rect width="260" height="118" rx="14" class="box"/>
    <text x="24" y="36" class="note">실습 메모 1</text>
    <text x="24" y="64" class="small">스캔 PDF는 텍스트 추출보다</text>
    <text x="24" y="86" class="small">layout 분리가 먼저다.</text>
  </g>

  <g transform="translate(400 330)">
    <rect width="260" height="118" rx="14" class="box"/>
    <text x="24" y="36" class="note">실습 메모 2</text>
    <text x="24" y="64" class="small">표는 행 단위로 자르면</text>
    <text x="24" y="86" class="small">의미가 깨지기 쉽다.</text>
  </g>

  <g transform="translate(696 330)">
    <rect width="260" height="118" rx="14" class="box"/>
    <text x="24" y="36" class="note">실습 메모 3</text>
    <text x="24" y="64" class="small">그림과 표는 caption, page,</text>
    <text x="24" y="86" class="small">section metadata가 필요하다.</text>
  </g>

  <g transform="translate(992 330)">
    <rect width="190" height="118" rx="14" class="box"/>
    <text x="24" y="36" class="note">체크포인트</text>
    <text x="24" y="64" class="small">검색 전 품질은</text>
    <text x="24" y="86" class="small">저장 단위에서 갈린다.</text>
  </g>

  <rect x="80" y="554" width="1120" height="94" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="110" y="590" class="note">내가 정리한 결론</text>
  <text x="110" y="622" class="small">PDF/OCR 파이프라인은 “읽기” 문제가 아니라 “구조를 보존해서 검색 가능한 형태로 바꾸는” 문제에 가깝다.</text>
</svg>
