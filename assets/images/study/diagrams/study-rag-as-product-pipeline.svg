<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" width="1180" height="520" role="img" aria-labelledby="title desc">
  <title id="title">RAG Indexing Pipeline and Query Pipeline</title>
  <desc id="desc">원문 문서가 parsing, chunking, embedding을 거쳐 vector store에 저장되고, 사용자 질문은 query rewriting, retrieval, reranking, context builder, LLM을 거쳐 근거 기반 답변으로 이어진다.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:26px;font-weight:800}
      .group-title{font-size:16px;font-weight:800;fill:#334155}
      .node-title{font-size:15px;font-weight:800}
      .node-sub{font-size:12px;fill:#64748b}
      .group{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:1.4}
      .store{fill:#eef2ff;stroke:#6366f1;stroke-width:1.8}
      .answer{fill:#ecfdf5;stroke:#10b981;stroke-width:1.8}
      .arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#cbd5e1;stroke-width:1.6;stroke-dasharray:6 6;fill:none}
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="520" fill="#ffffff"/>
  <text x="40" y="48" class="title">RAG는 두 개의 파이프라인으로 나뉜다</text>
  <text x="40" y="76" class="node-sub">Indexing Pipeline은 문서를 검색 가능한 형태로 만들고, Query Pipeline은 질문에 맞는 근거를 찾아 답변을 만든다.</text>

  <rect x="40" y="112" width="1100" height="152" rx="14" class="group"/>
  <text x="64" y="145" class="group-title">Indexing Pipeline</text>

  <g transform="translate(70 172)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">원문 문서</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">Document</text>
  </g>
  <g transform="translate(265 172)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">Parsing</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">텍스트 추출</text>
  </g>
  <g transform="translate(460 172)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">Chunking</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">의미 단위 분할</text>
  </g>
  <g transform="translate(655 172)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">Embedding</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">벡터화</text>
  </g>
  <g transform="translate(850 172)">
    <rect width="190" height="58" rx="10" class="store"/>
    <text x="95" y="25" text-anchor="middle" class="node-title">Vector Store</text>
    <text x="95" y="44" text-anchor="middle" class="node-sub">검색 인덱스</text>
  </g>
  <path d="M220 201H265" class="arrow"/>
  <path d="M415 201H460" class="arrow"/>
  <path d="M610 201H655" class="arrow"/>
  <path d="M805 201H850" class="arrow"/>

  <rect x="40" y="304" width="1100" height="170" rx="14" class="group"/>
  <text x="64" y="337" class="group-title">Query Pipeline</text>

  <g transform="translate(70 372)">
    <rect width="145" height="58" rx="10" class="node"/>
    <text x="72.5" y="25" text-anchor="middle" class="node-title">사용자 질문</text>
    <text x="72.5" y="44" text-anchor="middle" class="node-sub">User Query</text>
  </g>
  <g transform="translate(248 372)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">Query Rewriting</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">검색 질의 개선</text>
  </g>
  <g transform="translate(430 372)">
    <rect width="130" height="58" rx="10" class="node"/>
    <text x="65" y="25" text-anchor="middle" class="node-title">Retrieval</text>
    <text x="65" y="44" text-anchor="middle" class="node-sub">후보 검색</text>
  </g>
  <g transform="translate(592 372)">
    <rect width="130" height="58" rx="10" class="node"/>
    <text x="65" y="25" text-anchor="middle" class="node-title">Reranking</text>
    <text x="65" y="44" text-anchor="middle" class="node-sub">재정렬</text>
  </g>
  <g transform="translate(754 372)">
    <rect width="150" height="58" rx="10" class="node"/>
    <text x="75" y="25" text-anchor="middle" class="node-title">Context Builder</text>
    <text x="75" y="44" text-anchor="middle" class="node-sub">근거 구성</text>
  </g>
  <g transform="translate(936 372)">
    <rect width="80" height="58" rx="10" class="node"/>
    <text x="40" y="34" text-anchor="middle" class="node-title">LLM</text>
  </g>
  <g transform="translate(1042 360)">
    <rect width="78" height="82" rx="10" class="answer"/>
    <text x="39" y="31" text-anchor="middle" class="node-title">근거</text>
    <text x="39" y="50" text-anchor="middle" class="node-title">기반</text>
    <text x="39" y="69" text-anchor="middle" class="node-title">답변</text>
  </g>

  <path d="M215 401H248" class="arrow"/>
  <path d="M398 401H430" class="arrow"/>
  <path d="M560 401H592" class="arrow"/>
  <path d="M722 401H754" class="arrow"/>
  <path d="M904 401H936" class="arrow"/>
  <path d="M1016 401H1042" class="arrow"/>
  <path d="M945 230 C945 285 495 294 495 372" class="soft"/>
  <text x="705" y="290" class="node-sub">Vector Store에서 근거 후보를 가져온다</text>
</svg>
