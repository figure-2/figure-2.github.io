<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-labelledby="title desc">
  <title id="title">RAG Implementation Patterns</title>
  <desc id="desc">Naive RAG에서 query rewrite, hybrid search, reranker, evaluation을 붙여 개선하는 실습 흐름.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:30px;font-weight:800}.subtitle{font-size:14px;fill:#64748b}
      .lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.node{fill:#fff;stroke:#94a3b8;stroke-width:1.5}
      .base{fill:#eff6ff;stroke:#3b82f6}.improve{fill:#ecfdf5;stroke:#10b981}.eval{fill:#fff7ed;stroke:#f97316}.warn{fill:#fef2f2;stroke:#ef4444}
      .label{font-size:16px;font-weight:800}.small{font-size:12px;fill:#64748b}.note{font-size:14px;font-weight:700;fill:#334155}
      .arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="48" y="54" class="title">RAG 구현 패턴 실습 흐름</text>
  <text x="48" y="82" class="subtitle">처음부터 복잡한 구조를 만들기보다 baseline을 세우고 실패 지점별로 보강한다.</text>

  <rect x="54" y="122" width="1172" height="360" rx="18" class="lane"/>
  <g transform="translate(90 185)">
    <rect width="155" height="94" rx="14" class="node base"/>
    <text x="77" y="32" text-anchor="middle" class="label">Naive RAG</text>
    <text x="77" y="58" text-anchor="middle" class="small">chunk + vector search</text>
  </g>
  <path d="M250 232 H325" class="arrow"/>
  <g transform="translate(330 185)">
    <rect width="155" height="94" rx="14" class="node improve"/>
    <text x="77" y="32" text-anchor="middle" class="label">Query 개선</text>
    <text x="77" y="58" text-anchor="middle" class="small">rewrite, HyDE, SubQuery</text>
  </g>
  <path d="M490 232 H565" class="arrow"/>
  <g transform="translate(570 185)">
    <rect width="155" height="94" rx="14" class="node improve"/>
    <text x="77" y="32" text-anchor="middle" class="label">Hybrid Search</text>
    <text x="77" y="58" text-anchor="middle" class="small">BM25 + dense</text>
  </g>
  <path d="M730 232 H805" class="arrow"/>
  <g transform="translate(810 185)">
    <rect width="155" height="94" rx="14" class="node improve"/>
    <text x="77" y="32" text-anchor="middle" class="label">Reranker</text>
    <text x="77" y="58" text-anchor="middle" class="small">Top-K 재정렬</text>
  </g>
  <path d="M970 232 H1045" class="arrow"/>
  <g transform="translate(1050 185)">
    <rect width="130" height="94" rx="14" class="node eval"/>
    <text x="65" y="32" text-anchor="middle" class="label">평가</text>
    <text x="65" y="58" text-anchor="middle" class="small">retrieval + answer</text>
  </g>

  <g transform="translate(110 342)">
    <rect width="245" height="92" rx="14" class="node warn"/>
    <text x="24" y="34" class="note">실패 1. 검색 누락</text>
    <text x="24" y="60" class="small">질문 표현과 문서 표현이 다름</text>
  </g>
  <g transform="translate(385 342)">
    <rect width="245" height="92" rx="14" class="node warn"/>
    <text x="24" y="34" class="note">실패 2. context noise</text>
    <text x="24" y="60" class="small">Top-K에 관련 없는 chunk 포함</text>
  </g>
  <g transform="translate(660 342)">
    <rect width="245" height="92" rx="14" class="node warn"/>
    <text x="24" y="34" class="note">실패 3. 답변 과신</text>
    <text x="24" y="60" class="small">근거 부족에도 자연스럽게 생성</text>
  </g>
  <g transform="translate(935 342)">
    <rect width="210" height="92" rx="14" class="node warn"/>
    <text x="24" y="34" class="note">실패 4. 측정 부재</text>
    <text x="24" y="60" class="small">좋아졌는지 알 수 없음</text>
  </g>

  <rect x="78" y="538" width="1124" height="94" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="108" y="574" class="note">내가 정리한 결론</text>
  <text x="108" y="606" class="small">RAG 개선은 모델 교체보다 검색 실패를 분해하는 과정이다. chunk, query, retrieval, reranker, evaluation을 따로 봐야 한다.</text>
</svg>
