<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" width="1080" height="500" role="img" aria-labelledby="title desc">
  <title id="title">AI Native Operating Loop</title>
  <desc id="desc">Context, Workflow, Evaluation, Operation, Agent, Human Review가 다시 Context로 돌아오는 AI Native 운영 루프.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker>
    <style>text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:800}.sub{font-size:13px;fill:#64748b}.node{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.main{fill:#eef2ff;stroke:#6366f1;stroke-width:1.8}.review{fill:#fff7ed;stroke:#fb923c;stroke-width:1.8}.label{font-size:17px;font-weight:800}.small{font-size:12px;fill:#64748b}.arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.loop{stroke:#fb923c;stroke-width:2.2;fill:none;marker-end:url(#arrow);stroke-dasharray:7 6}</style></defs>
  <rect width="1080" height="500" fill="#ffffff"/>
  <text x="40" y="48" class="title">AI Native 팀의 운영 루프</text>
  <text x="40" y="76" class="sub">AI 도구 사용량보다 중요한 것은 context, workflow, evaluation, operation의 순서다.</text>
  <g transform="translate(60 210)"><rect width="150" height="76" rx="14" class="main"/><text x="75" y="31" text-anchor="middle" class="label">Context</text><text x="75" y="53" text-anchor="middle" class="small">요구사항·규칙·문서</text></g>
  <g transform="translate(260 210)"><rect width="150" height="76" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Workflow</text><text x="75" y="53" text-anchor="middle" class="small">반복 작업 설계</text></g>
  <g transform="translate(460 210)"><rect width="150" height="76" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Evaluation</text><text x="75" y="53" text-anchor="middle" class="small">테스트·체크리스트</text></g>
  <g transform="translate(660 210)"><rect width="150" height="76" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Operation</text><text x="75" y="53" text-anchor="middle" class="small">로그·비용·권한</text></g>
  <g transform="translate(860 210)"><rect width="150" height="76" rx="14" class="main"/><text x="75" y="31" text-anchor="middle" class="label">Agent</text><text x="75" y="53" text-anchor="middle" class="small">부분 자율 실행</text></g>
  <g transform="translate(455 370)"><rect width="170" height="68" rx="14" class="review"/><text x="85" y="29" text-anchor="middle" class="label">Human Review</text><text x="85" y="50" text-anchor="middle" class="small">검토와 책임 경계</text></g>
  <path d="M210 248H260" class="arrow"/><path d="M410 248H460" class="arrow"/><path d="M610 248H660" class="arrow"/><path d="M810 248H860" class="arrow"/><path d="M935 286C900 380 685 404 625 404" class="arrow"/><path d="M455 404C260 404 105 355 135 286" class="loop"/>
</svg>
