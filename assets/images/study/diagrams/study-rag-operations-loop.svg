<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" width="1180" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Production RAG Operations Loop</title>
  <desc id="desc">문서 준비, 질문 처리, 온라인 평가, 관측, 개선 작업이 다시 문서 준비로 돌아오는 운영 루프.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}
      .title{font-size:26px;font-weight:800}
      .sub{font-size:13px;fill:#64748b}
      .group{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
      .group-title{font-size:16px;font-weight:800;fill:#334155}
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:1.4}
      .eval{fill:#f0fdf4;stroke:#22c55e;stroke-width:1.7}
      .obs{fill:#eef2ff;stroke:#6366f1;stroke-width:1.7}
      .improve{fill:#fff7ed;stroke:#fb923c;stroke-width:1.7}
      .label{font-size:15px;font-weight:800}
      .small{font-size:12px;fill:#64748b}
      .arrow{stroke:#2563eb;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#fb923c;stroke-width:2.2;fill:none;marker-end:url(#arrow);stroke-dasharray:7 6}
    </style>
  </defs>
  <rect width="1180" height="620" fill="#ffffff"/>
  <text x="40" y="48" class="title">Production RAG는 실행 흐름과 운영 루프를 함께 봐야 한다</text>
  <text x="40" y="76" class="sub">각 단계는 실패 지점이므로 trace, metric, alert로 관측하고 다시 문서 준비 단계에 반영한다.</text>

  <rect x="40" y="118" width="510" height="220" rx="14" class="group"/>
  <text x="64" y="151" class="group-title">문서 준비</text>
  <g transform="translate(74 196)">
    <rect width="92" height="56" rx="10" class="node"/><text x="46" y="33" text-anchor="middle" class="label">Document</text>
  </g>
  <g transform="translate(190 196)">
    <rect width="92" height="56" rx="10" class="node"/><text x="46" y="33" text-anchor="middle" class="label">Parsing</text>
  </g>
  <g transform="translate(306 196)">
    <rect width="92" height="56" rx="10" class="node"/><text x="46" y="33" text-anchor="middle" class="label">Chunking</text>
  </g>
  <g transform="translate(422 196)">
    <rect width="92" height="56" rx="10" class="node"/><text x="46" y="25" text-anchor="middle" class="label">Embedding</text><text x="46" y="43" text-anchor="middle" class="small">Index</text>
  </g>
  <path d="M166 224H190" class="arrow"/><path d="M282 224H306" class="arrow"/><path d="M398 224H422" class="arrow"/>

  <rect x="630" y="118" width="510" height="220" rx="14" class="group"/>
  <text x="654" y="151" class="group-title">질문 처리</text>
  <g transform="translate(662 188)">
    <rect width="92" height="64" rx="10" class="node"/><text x="46" y="28" text-anchor="middle" class="label">Query</text><text x="46" y="47" text-anchor="middle" class="small">Router</text>
  </g>
  <g transform="translate(780 188)">
    <rect width="92" height="64" rx="10" class="node"/><text x="46" y="28" text-anchor="middle" class="label">Query</text><text x="46" y="47" text-anchor="middle" class="small">Translation</text>
  </g>
  <g transform="translate(898 188)">
    <rect width="92" height="64" rx="10" class="node"/><text x="46" y="28" text-anchor="middle" class="label">Hybrid</text><text x="46" y="47" text-anchor="middle" class="small">Search</text>
  </g>
  <g transform="translate(1016 188)">
    <rect width="92" height="64" rx="10" class="node"/><text x="46" y="28" text-anchor="middle" class="label">Rerank</text><text x="46" y="47" text-anchor="middle" class="small">Generate</text>
  </g>
  <path d="M754 220H780" class="arrow"/><path d="M872 220H898" class="arrow"/><path d="M990 220H1016" class="arrow"/>
  <path d="M514 224C568 224 584 220 630 220" class="arrow"/>

  <g transform="translate(200 424)">
    <rect width="190" height="72" rx="12" class="eval"/>
    <text x="95" y="31" text-anchor="middle" class="label">Online Evaluation</text>
    <text x="95" y="52" text-anchor="middle" class="small">품질 / 회귀 확인</text>
  </g>
  <g transform="translate(495 424)">
    <rect width="190" height="72" rx="12" class="obs"/>
    <text x="95" y="31" text-anchor="middle" class="label">Trace / Metric / Alert</text>
    <text x="95" y="52" text-anchor="middle" class="small">관측과 경보</text>
  </g>
  <g transform="translate(790 424)">
    <rect width="190" height="72" rx="12" class="improve"/>
    <text x="95" y="31" text-anchor="middle" class="label">개선 작업</text>
    <text x="95" y="52" text-anchor="middle" class="small">문서와 검색 품질 개선</text>
  </g>
  <path d="M1016 252C930 390 410 340 295 424" class="arrow"/>
  <path d="M390 460H495" class="arrow"/>
  <path d="M685 460H790" class="arrow"/>
  <path d="M790 482C520 590 90 528 92 252" class="loop"/>
</svg>
