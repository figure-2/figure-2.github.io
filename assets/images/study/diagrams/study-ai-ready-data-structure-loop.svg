<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" role="img" aria-labelledby="title desc">
  <title id="title">AI-Ready Data Structuring Loop</title>
  <desc id="desc">Inventory, Schema, Normalize, Prepare for AI, Evaluate가 반복되는 데이터 구조화 루프.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker>
    <style>text{font-family:"Pretendard","Noto Sans KR",Inter,Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:800}.sub{font-size:13px;fill:#64748b}.node{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.main{fill:#eef2ff;stroke:#6366f1;stroke-width:1.8}.eval{fill:#ecfdf5;stroke:#10b981;stroke-width:1.8}.label{font-size:16px;font-weight:800}.small{font-size:12px;fill:#64748b}.arrow{stroke:#2563eb;stroke-width:2.1;fill:none;marker-end:url(#arrow)}.loop{stroke:#fb923c;stroke-width:2.1;fill:none;marker-end:url(#arrow);stroke-dasharray:7 6}</style></defs>
  <rect width="1000" height="360" fill="#ffffff"/>
  <text x="40" y="48" class="title">AI-Ready Data는 한 번의 정리가 아니라 반복 루프다</text>
  <text x="40" y="76" class="sub">데이터 목록화, 구조 정의, 정규화, AI 목적별 변환, 평가가 다시 인벤토리로 돌아간다.</text>
  <g transform="translate(50 165)"><rect width="150" height="70" rx="14" class="main"/><text x="75" y="31" text-anchor="middle" class="label">Inventory</text><text x="75" y="52" text-anchor="middle" class="small">데이터 목록</text></g>
  <g transform="translate(245 165)"><rect width="150" height="70" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Schema</text><text x="75" y="52" text-anchor="middle" class="small">관계와 규칙</text></g>
  <g transform="translate(440 165)"><rect width="150" height="70" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Normalize</text><text x="75" y="52" text-anchor="middle" class="small">용어와 형식</text></g>
  <g transform="translate(635 165)"><rect width="150" height="70" rx="14" class="node"/><text x="75" y="31" text-anchor="middle" class="label">Prepare for AI</text><text x="75" y="52" text-anchor="middle" class="small">RAG / Agent / Dataset</text></g>
  <g transform="translate(830 165)"><rect width="120" height="70" rx="14" class="eval"/><text x="60" y="31" text-anchor="middle" class="label">Evaluate</text><text x="60" y="52" text-anchor="middle" class="small">회귀 기준</text></g>
  <path d="M200 200H245" class="arrow"/><path d="M395 200H440" class="arrow"/><path d="M590 200H635" class="arrow"/><path d="M785 200H830" class="arrow"/>
  <path d="M890 235C840 315 110 315 125 235" class="loop"/>
</svg>
